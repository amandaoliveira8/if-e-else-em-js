    <h1>Qual a diferença entre if e else? Dê um exemplo simples.</h1>

<h2>"if" executa um bloco de código se for verdadeiro enquanto "else" se for falso. </h2>

        <script>

let idade=19;
if(idade>=18){
    console.log("maior de idade");
}else{
    console.log("menor de idade");
}

        </script>
